name: Main

# Push to dev: nothing runs.
# PR dev → main (open/update): test → build.
# PR dev → main (merged): deploy to PyPI (tests already passed on the PR).
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: read

concurrency:
  group: main-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Config validation tests
        run: |
          pytest \
            tests/regression/test_global_vacuum_hours_config.py \
            tests/regression/test_feed_spec_validation.py \
            -q

      - name: Unit tests (no Spark)
        run: |
          pytest \
            tests/regression/test_load_integrity_unit.py \
            tests/regression/test_feed_spec_validation.py \
            tests/regression/test_cdc_schema_helpers.py \
            tests/regression/test_result_generator_sheets.py \
            -q

      - name: Integration tests (Spark)
        run: |
          pytest tests/regression -m integration -q --tb=short

  version-check:
    name: Version check
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify version single source of truth
        run: |
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PACKAGE_VERSION=$(python -c "
          import importlib.util
          spec = importlib.util.spec_from_file_location('hf_version', 'src/handuflow/_version.py')
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          print(mod._version_from_pyproject())
          ")
          test "$PYPROJECT_VERSION" = "$PACKAGE_VERSION"
          echo "Version OK: $PYPROJECT_VERSION"

  build:
    name: Build package
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs:
      - test
      - version-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

  deploy:
    name: Deploy to PyPI
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Extract changelog for this release
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          awk "/## \\[$VERSION\\]/{flag=1;next}/## \\[/{flag=0}flag" CHANGELOG.md > release_notes.md
          if [ -s release_notes.md ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No CHANGELOG section for [$VERSION] — skipping PyPI deploy."
          fi

      - name: Install build tools
        if: steps.changelog.outputs.ready == 'true'
        run: python -m pip install --upgrade pip build

      - name: Build package
        if: steps.changelog.outputs.ready == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.changelog.outputs.ready == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        if: steps.changelog.outputs.ready == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: handuflow v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: dist/*

      - name: Skip — not a release merge
        if: steps.changelog.outputs.ready != 'true'
        run: echo "Merged PR has no release notes in CHANGELOG.md; deploy skipped."
