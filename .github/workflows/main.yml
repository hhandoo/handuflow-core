name: Main

# Push to dev: nothing runs.
# PR dev → main merged: one workflow run — build → deploy to PyPI.
on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  id-token: write

concurrency:
  group: main-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to PyPI
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Extract changelog for this release
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          awk "/## \\[$VERSION\\]/{flag=1;next}/## \\[/{flag=0}flag" CHANGELOG.md > release_notes.md
          if [ -s release_notes.md ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No CHANGELOG section for [$VERSION] — skipping PyPI deploy."
          fi

      - name: Install build tools
        if: steps.changelog.outputs.ready == 'true'
        run: python -m pip install --upgrade pip build

      - name: Build package
        if: steps.changelog.outputs.ready == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.changelog.outputs.ready == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        if: steps.changelog.outputs.ready == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: handuflow v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: dist/*

      - name: Skip — not a release merge
        if: steps.changelog.outputs.ready != 'true'
        run: echo "Merged PR has no release notes in CHANGELOG.md; deploy skipped."
