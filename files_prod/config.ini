; Production / Databricks template — copy to your handuflow_dir on Volumes or DBFS.
; See documentation/DEPLOYMENT.md and documentation/CONFIG.md.

[DEFAULT]
outbound_directory_name=handuflow_outbound
log_directory_name=handuflow_logs
file_hunt_path=/dbfs/mnt/handuflow_dir
temp_location=/dbfs/mnt/handuflow_dir/temp
temp_log_location=/dbfs/mnt/handuflow_dir/temp
log_retention_policy_in_days=30
max_concurrent_batches=8
global_vacuum_hours=720
system_schema=my_catalog.system_admin

[PLATFORM]
runtime_mode=unity_catalog

[DMC_CONFIG]
temp=/dbfs/mnt/handuflow_dir/dmc_temp

[FILES]
master_spec_name=master_specs.xlsx

[LINEAGE_DIAGRAM]
BOX_WIDTH=4.4
BOX_HEIGHT=2.2
X_GAP=2.0
Y_GAP=2.5
ROOT_GAP=2.0
