name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show versions
        run: |
          python --version
          java --version

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Config validation tests
        run: |
          pytest \
            tests/regression/test_global_vacuum_hours_config.py \
            tests/regression/test_feed_spec_validation.py \
            -q

      - name: Unit tests (no Spark)
        run: |
          pytest \
            tests/regression/test_load_integrity_unit.py \
            tests/regression/test_feed_spec_validation.py \
            tests/regression/test_cdc_schema_helpers.py \
            tests/regression/test_result_generator_sheets.py \
            -q

      - name: Integration tests (Spark)
        run: |
          pytest tests/regression -m integration -q --tb=short

  version-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify version single source of truth
        shell: bash
        run: |
          set -euo pipefail

          PYPROJECT=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")

          PACKAGE=$(python -c "
          import pathlib, re
          text = pathlib.Path('src/handuflow/_version.py').read_text()
          m = re.search(r'__version__\s*=\s*[\"\\'\\'']([^\"\\'\\'']+)[\"\\'\\'']', text)
          if not m:
              raise SystemExit('Could not find __version__ in _version.py')
          print(m.group(1))
          ")

          test \"$PYPROJECT\" = \"$PACKAGE\"

          echo \"Version OK: $PYPROJECT\"