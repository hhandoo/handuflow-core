name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Config validation tests
        run: pytest tests/regression/test_global_vacuum_hours_config.py tests/regression/test_feed_spec_validation.py -q

      - name: Unit tests (no Spark)
        run: |
          pytest tests/regression/test_load_integrity_unit.py \
            tests/regression/test_feed_spec_validation.py \
            tests/regression/test_cdc_schema_helpers.py \
            tests/regression/test_result_generator_sheets.py -q

      - name: Integration tests (Spark)
        run: pytest tests/regression -m integration -q --tb=short

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify version single source of truth
        run: |
          PYPROJECT=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PACKAGE=$(PYTHONPATH=src python -c "from handuflow._version import __version__; print(__version__)")
          test "$PYPROJECT" = "$PACKAGE"
          echo "Version OK: $PYPROJECT"
